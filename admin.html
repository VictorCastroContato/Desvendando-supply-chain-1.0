<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar página | Desvendando a Supply Chain</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-card" id="loginCard">
      <p class="eyebrow">Área oculta</p>
      <h1>Edição da página</h1>
      <p class="muted">Acesso protegido por senha no servidor. Esta página não aparece para os visitantes.</p>
      <form id="loginForm">
        <label>Senha de administrador
          <input type="password" id="password" autocomplete="current-password" required />
        </label>
        <button class="btn btn--primary" type="submit">Entrar</button>
      </form>
      <p class="form-message" id="loginMessage"></p>
    </section>
    <section class="admin-card hidden" id="editCard">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Painel de edição</p>
          <h1>Conteúdo da página pública</h1>
        </div>
        <button class="btn btn--ghost" id="logoutButton" type="button">Sair</button>
      </div>
      <form id="editForm" class="grid-form">
        <label>Título <input name="title" required /></label>
        <label>Subtítulo <input name="subtitle" required /></label>
        <label>Destaque <input name="highlight" /></label>
        <label>Autor <input name="author" /></label>
        <label>Cargo <input name="role" /></label>
        <label>Instagram <input name="instagram" /></label>
        <label>Link do Instagram <input name="instagramUrl" /></label>
        <label>Texto do botão de download <input name="downloadButton" /></label>
        <label>Texto do botão secundário <input name="secondaryButton" /></label>
        <label>Versão <input name="version" /></label>
        <label>Páginas <input name="pages" /></label>
        <label>Nome do arquivo no download <input name="downloadFileName" /></label>
        <label class="full">Descrição <textarea name="description" rows="5"></textarea></label>
        <label class="full">Texto do rodapé <textarea name="footerNote" rows="3"></textarea></label>
        <button class="btn btn--primary" type="submit">Salvar alterações</button>
      </form>
      <p class="form-message" id="saveMessage"></p>
      <p class="muted small">Para trocar o PDF ou a capa, substitua os arquivos dentro de <code>public/assets</code> mantendo os nomes atuais.</p>
    </section>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
